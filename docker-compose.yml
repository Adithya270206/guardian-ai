version: '3.8'

services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./gateway:/app/gateway
      - ./policy:/app/policy
      - ./risk:/app/risk
      - ./action:/app/action
      - ./tools:/app/tools
      - ./logger:/app/logger
      - ./agents:/app/agents
      - ./database:/app/database
      - ./dashboard:/app/dashboard
      - ./notifications:/app/notifications
      - ./agent:/app/agent
      - ./detectors:/app/detectors
      - ./demo:/app/demo
    environment:
      - ENV=production
    restart: always

  frontend:
    build:
      context: ./
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://127.0.0.1:8000
    depends_on:
      - backend
    restart: always
